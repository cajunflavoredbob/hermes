services:
  hermes:
    # For local development: build .
    # For published image: image: cajunflavoredbob/hermes:latest
    build: .
    container_name: hermes
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ./data:/data
    # No environment variables required. After first start, open
    # http://<host>:8765/admin to finish setup. Advanced users can pin
    # the Plex-token encryption key here (otherwise auto-generated), and
    # should set TRUSTED_PROXIES when running behind a TLS reverse proxy
    # (see "Securing the admin UI" in the README):
    #   environment:
    #     HERMES_ENCRYPTION_KEY: ${HERMES_ENCRYPTION_KEY}
    #     TRUSTED_PROXIES: "172.18.0.0/16"
